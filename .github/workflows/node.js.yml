name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended latexmk

      - name: Build documents
        run: |
          cd homepage
          bash build-documents.sh

      - name: Commit compiled PDFs back to repo
        run: |
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy compiled PDFs back to their source locations
          for tex_file in $(find summaries -name "main.tex" -type f); do
            project_dir=$(dirname "$tex_file")
            rel_path=${project_dir#summaries/}
            output_name=$(echo "$rel_path" | tr '/' '-')
            compiled="homepage/src/uploads/${output_name}.pdf"
            if [ -f "$compiled" ]; then
              cp "$compiled" "${project_dir}/main.pdf"
            fi
          done

          # Only commit if there are changes
          if git diff --quiet; then
            echo "No PDF changes to commit"
          else
            git add summaries/*/main.pdf summaries/*/*/main.pdf
            git commit -m "Update compiled PDFs [skip ci]"
            git push
          fi

      - name: Install dependencies and build website
        run: |
          cd homepage
          npm install
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: homepage/public

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
