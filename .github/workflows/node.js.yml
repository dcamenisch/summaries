name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Compile Typst documents
        run: |
          shopt -s globstar nullglob
          for f in docs/**/*.typ docs/*.typ; do
            name=$(basename "$f" .typ)
            typst compile "$f" "src/uploads/${name}.pdf"
          done

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended latexmk

      - name: Compile LaTeX documents
        run: |
          shopt -s globstar nullglob
          for f in docs/**/*.tex docs/*.tex; do
            name=$(basename "$f" .tex)
            latexmk -pdf -output-directory="$(pwd)/src/uploads" "$f"
          done
          find src/uploads \( -name "*.aux" -o -name "*.log" -o -name "*.fls" -o -name "*.fdb_latexmk" \) -delete

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
